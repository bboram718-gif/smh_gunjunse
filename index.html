<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SMH 견적서 생성기</title>
<style>
:root{
  --paper:#fffdfa;--ink:#1d1c19;--sub:#6f6a62;--muted:#9a948b;
  --line:#e7e1d8;--line-strong:#d8cec0;--gold:#b8985a;
  --peach:#e8b8ad;--lav:#cdbbe8;--mint:#61c5a2;--blue:#9fc3e4;
  --gold2:#d9b878;--rose:#dba0b6;--olive:#a8b673;--teal:#6cc0c0;
  --track:#efebe4;--red:#b94d4f;--red-soft:#fbf1f1;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f0ece4;min-height:100vh;color:var(--ink);}
#app-shell{max-width:1320px;margin:0 auto;padding:28px 20px 60px;display:grid;grid-template-columns:minmax(420px,640px) minmax(420px,1fr);gap:24px;align-items:start;}
#form-screen{max-width:none;margin:0;padding:0;}
.form-header{margin-bottom:28px;}
.form-logo{font-size:11px;letter-spacing:.18em;color:#8d8880;margin-bottom:6px;}
.form-title{font-size:26px;font-weight:700;letter-spacing:-.04em;margin-bottom:4px;}
.form-sub{font-size:13px;color:var(--sub);}
.card{background:var(--paper);border-radius:16px;padding:20px 18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.card-title{font-size:10.5px;letter-spacing:.14em;color:#99928a;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:.5px solid var(--line);}
.field{margin-bottom:12px;}
.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:11px;color:var(--sub);margin-bottom:4px;font-weight:600;}
.field input,.field textarea{width:100%;padding:10px 12px;border:.5px solid var(--line-strong);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink);outline:none;transition:border-color .15s;}
.field input:focus,.field textarea:focus{border-color:var(--gold);}
.field textarea{resize:vertical;min-height:70px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.price-input-wrap{position:relative;}
.price-input-wrap input{padding-right:28px;}
.price-unit{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted);pointer-events:none;}
.total-preview{margin-top:8px;padding:14px;background:#f5efe3;border-radius:10px;font-size:13px;color:var(--sub);line-height:1.9;}
.trow{display:flex;justify-content:space-between;}
.trow.divline{border-top:.5px solid var(--line-strong);margin-top:6px;padding-top:6px;}
.trow.final-line{border-top:1.5px solid var(--ink);margin-top:4px;padding-top:6px;}
.trow .tv{font-weight:600;color:var(--ink);}
.trow .tv.red{color:var(--red);}
.trow.final-line .tv{font-size:16px;font-weight:700;color:var(--gold);}
.sec-block{background:var(--paper);border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid var(--gold);}
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.sec-name-input{flex:1;padding:7px 10px;border:.5px solid var(--line-strong);border-radius:7px;font-size:13px;font-weight:700;font-family:inherit;background:#fff;color:var(--ink);margin-right:8px;}
.btn-del-sec{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;line-height:1;}
.item-block{margin-bottom:10px;padding-bottom:10px;border-bottom:.5px solid var(--line);}
.item-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.item-top{display:flex;gap:8px;align-items:center;margin-bottom:4px;}
.item-name{flex:0 0 120px;min-width:80px;padding:8px 10px;border:.5px solid var(--line);border-radius:7px;font-size:13px;font-family:inherit;background:#faf8f4;color:var(--ink);}
.item-price-wrap{position:relative;flex:1;min-width:0;}
.item-price-wrap input{width:100%;padding:8px 26px 8px 10px;border:.5px solid var(--line);border-radius:7px;font-size:13px;font-family:inherit;background:#faf8f4;color:var(--ink);text-align:right;}
.item-price-wrap .pu{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--muted);pointer-events:none;}
.item-desc{width:100%;padding:6px 10px;border:.5px solid var(--line);border-radius:7px;font-size:11.5px;font-family:inherit;background:#faf8f4;color:var(--sub);}
.btn-del-item{background:none;border:none;color:#ccc;font-size:15px;cursor:pointer;padding:2px;flex-shrink:0;}
.btn-calc{background:none;border:none;color:#c9c2b6;font-size:14px;cursor:pointer;padding:2px 4px;flex-shrink:0;border-radius:5px;}
.btn-calc:hover{color:var(--gold);background:#f5f1ea;}
.btn-calc.on{color:var(--gold);background:#f0e8d8;}
.btn-move{background:none;border:none;color:#c9c2b6;font-size:11px;cursor:pointer;padding:2px 3px;flex-shrink:0;border-radius:5px;line-height:1;}
.btn-move:hover{color:var(--gold);background:#f5f1ea;}
.calc-panel{display:none;margin-top:6px;padding:9px 10px;background:#f5f1ea;border:.5px solid var(--line);border-radius:8px;gap:7px;align-items:center;flex-wrap:wrap;}
.calc-panel.open{display:flex;}
.calc-panel input{width:74px;padding:6px 8px;border:.5px solid var(--line-strong);border-radius:6px;font-size:12px;font-family:inherit;background:#fff;color:var(--ink);text-align:right;}
.calc-panel select{padding:6px 4px;border:.5px solid var(--line-strong);border-radius:6px;font-size:11px;font-family:inherit;background:#fff;color:var(--ink);}
.calc-panel .calc-x{color:var(--muted);font-size:12px;}
.calc-panel .calc-eq{color:var(--gold);font-size:12px;font-weight:700;}
.calc-panel .calc-result{font-size:12px;font-weight:700;color:var(--ink);min-width:70px;}
.calc-panel label{font-size:11px;color:var(--sub);}
.btn-add-item{width:100%;margin-top:10px;padding:9px;border:1px dashed var(--line-strong);border-radius:8px;background:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;}
.btn-add-item:hover{border-color:var(--gold);color:var(--gold);}
.btn-add-sec{width:100%;padding:13px;border:1.5px dashed var(--line-strong);border-radius:12px;background:none;color:var(--sub);font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:14px;}
.btn-add-sec:hover{border-color:var(--gold);color:var(--gold);}
.btn-generate{width:100%;padding:16px;background:var(--ink);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:-.02em;margin-top:4px;}
.btn-generate:hover{background:#333;}
.save-bar{display:flex;gap:7px;margin-bottom:6px;}
.save-btn{flex:1;padding:11px 8px;background:#fff;color:var(--ink);border:.5px solid var(--line-strong);border-radius:9px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;letter-spacing:-.01em;}
.save-btn:hover{background:#faf8f4;border-color:var(--gold);}
.save-btn-reset{color:#b5564a;}
.save-btn-reset:hover{background:#fbf2f0;border-color:#d99;}
.save-hint{font-size:11px;color:var(--muted);margin-bottom:16px;line-height:1.6;}
#live-preview-pane{position:sticky;top:18px;max-height:calc(100vh - 36px);overflow:auto;padding:0 4px 20px;}
.live-preview-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;padding:2px 2px 0;}
.live-preview-kicker{font-size:10px;letter-spacing:.16em;color:#9a948b;font-weight:800;margin-bottom:2px;}
.live-preview-title{font-size:17px;font-weight:700;letter-spacing:-.04em;}
.live-preview-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.live-preview-btn{background:var(--ink);color:#fff;border:none;border-radius:9px;padding:9px 12px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
.live-preview-btn:hover{background:#333;}
.live-preview-scroll{background:#e7e1d8;border-radius:16px;padding:12px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.03);}
#live-quote-output{box-shadow:0 10px 28px rgba(35,28,18,.13);border-radius:10px;overflow:hidden;min-height:760px;}
#preview-screen{display:none;}
.preview-toolbar{position:sticky;top:0;z-index:100;background:var(--ink);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
.btn-back{background:none;border:1.5px solid rgba(255,255,255,.3);color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;}
.toolbar-right{display:flex;gap:8px;}
.btn-dl{background:var(--gold);border:none;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-print{background:none;border:1.5px solid var(--gold);color:var(--gold);padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
#quote-output,#live-quote-output{max-width:600px;margin:0 auto;padding:24px 20px 36px;background:var(--paper);min-height:calc(100vh - 60px);}
.q-logo{font-size:11px;letter-spacing:.16em;color:#8d8880;margin-bottom:6px;}
.q-header{border-bottom:2px solid var(--ink);padding-bottom:12px;}
.q-header-row{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;}
.q-title{font-size:28px;font-weight:650;letter-spacing:-.055em;line-height:1.1;margin-bottom:6px;}
.q-sub{font-size:13px;line-height:1.55;color:var(--sub);}
.q-meta{text-align:right;font-size:11px;line-height:1.72;color:var(--muted);white-space:nowrap;}
.q-client{margin-top:11px;font-size:12.5px;line-height:1.8;color:var(--sub);}
.q-client b{color:var(--ink);font-weight:650;}
.q-sep{color:#c8c0b5;padding:0 7px;}
.q-total{margin-top:4px;border-top:4px solid var(--gold);border-bottom:.5px solid var(--line-strong);padding:15px 0 14px;}
.q-total-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.q-total-label{font-size:13px;color:var(--sub);font-weight:600;}
.q-vat{font-size:11px;color:var(--muted);}
.q-total-price{font-size:36px;line-height:1;font-weight:750;letter-spacing:-.065em;}
.q-divider{margin:17px 0 7px;}
.q-divider .dg{height:4px;background:var(--gold);border-radius:8px;}
.q-divider .db{margin-top:4px;height:2px;background:var(--ink);border-radius:8px;}
.q-section{padding-top:14px;}
.q-sec-body{padding-left:14px;border-left:3px solid var(--sec-color,var(--line-strong));}
.q-section+.q-section{margin-top:28px;}
.q-sec-label{font-size:14px;letter-spacing:.04em;color:var(--ink);font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:7px;}
.q-sec-label::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--sec-color,var(--line-strong));flex-shrink:0;}
.q-sec-total{display:flex;align-items:baseline;justify-content:flex-end;gap:10px;margin-top:10px;padding-top:9px;padding-left:14px;border-top:1.5px solid var(--sec-color,var(--line-strong));}
.q-sec-total-k{font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--sub);}
.q-sec-total-v{font-size:18px;font-weight:800;letter-spacing:-.03em;color:var(--ink);}
.q-row{padding:12px 0;border-bottom:.5px solid var(--line);}
.q-section .q-row:last-child{border-bottom:0;}
.q-row-main{display:grid;grid-template-columns:minmax(110px,1.25fr) minmax(130px,2fr) auto;gap:10px;align-items:center;margin-bottom:5px;}
.q-name{font-size:14px;font-weight:560;letter-spacing:-.035em;min-width:0;white-space:normal;overflow:visible;word-break:keep-all;overflow-wrap:anywhere;line-height:1.42;}
.q-price{font-size:14px;font-weight:650;letter-spacing:-.04em;text-align:right;white-space:nowrap;flex-shrink:0;}
.q-bar{height:5px;background:var(--track);border-radius:4px;overflow:hidden;margin-bottom:0;min-width:80px;}
.q-fill{display:block;height:100%;border-radius:4px;}
.q-bar-empty{background:transparent;}
.q-desc{font-size:11.5px;line-height:1.58;color:#8a847c;}
.q-fixed-row{padding:12px 0;border-bottom:.5px solid var(--line);}
.q-fixed-row .q-name{color:var(--sub);font-weight:500;}
.q-fixed-row .q-price{color:var(--sub);}
.q-adjust{margin-left:-8px;margin-right:-8px;padding-left:8px;padding-right:8px;background:var(--red-soft);}
.q-adjust .q-name,.q-adjust .q-price{color:var(--red);}
.q-tag{display:inline-block;margin-right:6px;padding:1px 6px 2px;border-radius:999px;background:rgba(185,77,79,.08);color:var(--red);font-size:10px;font-weight:700;vertical-align:1px;}
.q-adjust .q-desc{color:#9a6666;}
.q-final{margin:14px 0 0;padding:13px 0 0;border-top:2px solid var(--ink);display:flex;justify-content:space-between;align-items:flex-end;gap:12px;}
.q-final-k{display:block;font-size:12px;color:var(--sub);font-weight:700;margin-bottom:3px;}
.q-final-note{display:block;font-size:10.5px;color:var(--muted);}
.q-final-price{font-size:28px;line-height:1;font-weight:760;letter-spacing:-.055em;white-space:nowrap;}
.q-memo{margin-top:22px;margin-bottom:22px;}
.q-memo-title{font-size:11px;letter-spacing:.12em;color:#5f564b;font-weight:800;margin-bottom:8px;}
.q-memo-box{border:1px solid var(--line-strong);border-left:4px solid var(--gold);background:#fbf8f2;border-radius:12px;padding:14px 15px;}
.q-memo-box p{position:relative;margin:0;padding-left:11px;font-size:13px;line-height:1.76;color:#3f3a34;font-weight:560;}
.q-memo-box p+p{margin-top:7px;}
.q-memo-box p::before{content:"";position:absolute;left:0;top:.82em;width:4px;height:4px;border-radius:50%;background:var(--gold);}
.q-payment{margin-top:4px;padding-top:12px;border-top:.5px solid var(--line-strong);}
.q-pay-title{font-size:10.5px;letter-spacing:.12em;color:#8a847b;font-weight:700;margin-bottom:7px;}
.q-pay-line{font-size:12.5px;line-height:1.75;color:var(--sub);}
.q-pay-line b{color:var(--ink);font-weight:650;}
.q-account{margin-top:8px;padding:9px 11px;border:.5px solid var(--line);border-radius:8px;background:#fff;}
.q-account-k{display:block;color:var(--muted);font-size:10.5px;letter-spacing:.10em;margin-bottom:3px;}
.q-account-v{font-size:15px;font-weight:650;}
.q-footer{margin-top:17px;padding-top:13px;border-top:.5px solid var(--line-strong);}
.q-info{font-size:12px;line-height:1.75;color:var(--sub);}
.q-info b{color:var(--ink);font-weight:650;}
.q-note{margin-top:8px;font-size:10.5px;line-height:1.65;color:var(--muted);}
#live-quote-output{min-height:760px;}
@media (max-width:1040px){
  #app-shell{display:block;max-width:720px;padding:24px 16px 60px;}
  #form-screen{max-width:640px;margin:0 auto;}
  #live-preview-pane{position:static;max-height:none;margin-top:24px;padding:0;}
  .live-preview-scroll{padding:9px;border-radius:14px;}
  #live-quote-output{min-height:auto;}
}
@media (max-width:520px){
  #app-shell{padding:22px 12px 50px;}
  .row2{grid-template-columns:1fr;}
  .item-top{align-items:flex-start;flex-wrap:wrap;}
  .item-name{flex:1 1 100%;}
  .item-price-wrap{flex:1 1 180px;}
  .live-preview-head{align-items:flex-start;flex-direction:column;}
  .live-preview-btn{width:100%;}
  #quote-output,#live-quote-output{padding:20px 16px 30px;}
  .q-header-row{display:block;}
  .q-meta{text-align:left;margin-top:8px;}
  .q-row-main{grid-template-columns:1fr auto;gap:7px;}
  .q-bar{grid-column:1 / -1;grid-row:2;}
  .q-price{text-align:right;}
}
@media print{#app-shell{display:none!important;}.preview-toolbar{display:none!important;}body{background:#fff;}#quote-output{padding:0;}.q-bar{-webkit-print-color-adjust:exact;print-color-adjust:exact;background:#e8e8e8!important;}.q-fill{-webkit-print-color-adjust:exact;print-color-adjust:exact;}.q-section{-webkit-print-color-adjust:exact;print-color-adjust:exact;}.q-sec-body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}.q-sec-label::before{-webkit-print-color-adjust:exact;print-color-adjust:exact;}.q-sec-total{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}


/* ===== 입력 생성기: 엑셀형 실무 UI ===== */
body{background:#eef1f4;}
#app-shell{max-width:1500px;grid-template-columns:minmax(560px,720px) minmax(420px,1fr);gap:18px;padding:18px 18px 56px;}
#form-screen{background:#fff;border:1px solid #c9d1d9;border-radius:7px;overflow:hidden;box-shadow:0 8px 24px rgba(31,41,55,.08);}
.form-header{margin:0;padding:14px 16px;background:#1f2933;color:#fff;border-bottom:1px solid #111827;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
.form-logo{margin:0;color:#d8b866;font-size:10px;letter-spacing:.18em;}
.form-title{margin:0;font-size:20px;font-weight:760;letter-spacing:-.04em;line-height:1.12;}
.form-sub{margin:0 0 1px;color:#cbd5df;font-size:12px;white-space:nowrap;}
.save-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:0;padding:10px 12px;background:#f6f8fa;border-bottom:1px solid #d8dee5;}
.save-btn{padding:8px 10px;border:1px solid #bdc6cf;border-radius:4px;background:#fff;color:#24303b;font-size:12px;font-weight:700;box-shadow:none;}
.save-btn:hover{background:#eef2f6;border-color:#8b98a6;}
.save-btn-reset{color:#a33d37;}
.save-btn-reset:hover{background:#fff1f0;border-color:#d29a95;}
.save-hint{margin:0;padding:0 12px 10px;background:#f6f8fa;border-bottom:1px solid #d8dee5;color:#7a8591;font-size:11px;line-height:1.55;}
.card{margin:0;padding:0;background:#fff;border-radius:0;border:0;border-bottom:1px solid #cfd6dd;box-shadow:none;}
.card-title{margin:0;padding:7px 10px;background:#e9edf2;border-bottom:1px solid #cfd6dd;color:#394653;font-size:12px;font-weight:800;letter-spacing:0;}
.card .field{display:grid;grid-template-columns:100px minmax(0,1fr);align-items:stretch;margin:0;border-bottom:1px solid #e2e7ec;}
.card .field:last-child{border-bottom:0;}
.card .field label{display:flex;align-items:center;margin:0;padding:8px 10px;background:#f7f8fa;border-right:1px solid #e2e7ec;color:#4b5563;font-size:12px;font-weight:700;line-height:1.2;}
.card .field input,.card .field textarea{border:0;border-radius:0;background:#fff;padding:8px 10px;min-height:36px;font-size:13px;}
.card .field textarea{min-height:86px;line-height:1.55;}
.card .field.memo-field{display:block;grid-template-columns:1fr;border-bottom:0;}
.card .field.memo-field label{align-items:flex-start;padding-top:10px;}
.card .field.memo-field textarea{display:block;width:100%;}
#f-memo{min-height:170px;line-height:1.65;resize:vertical;overflow:hidden;}
.card .field input:focus,.card .field textarea:focus{outline:2px solid rgba(184,152,90,.35);outline-offset:-2px;border-color:transparent;}
.card .row2{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.card .row2>.field{border-bottom:1px solid #e2e7ec;}
.card .row2>.field:nth-child(odd){border-right:1px solid #e2e7ec;}
.price-input-wrap{display:block;position:relative;}
.price-input-wrap input{padding-right:30px!important;}
.price-unit{right:10px;font-size:11px;color:#8b949e;}
.total-preview{margin:0;padding:10px 12px;background:#fff;border-radius:0;font-size:12.5px;line-height:1.75;}
.trow{padding:1px 0;}
.trow.divline{border-top:1px solid #d8dee5;margin-top:5px;padding-top:5px;}
.trow.final-line{border-top:2px solid #1f2933;margin-top:5px;padding-top:6px;background:#fbfaf5;margin-left:-12px;margin-right:-12px;padding-left:12px;padding-right:12px;}
.trow.final-line .tv{color:#9d7c31;}

#sections-wrap{background:#fff;}
.sec-block{margin:0;padding:0;background:#fff;border:0!important;border-radius:0;box-shadow:none;border-bottom:1px solid #cfd6dd!important;}
.sec-header{display:flex;align-items:center;margin:0;padding:7px 10px;background:#dfe7ef;border-top:2px solid #5b6b7b;border-bottom:1px solid #c6d0da;gap:8px;}
.sec-name-input{flex:1;margin:0;padding:5px 7px;border:1px solid transparent;border-radius:3px;background:transparent;color:#17212b;font-size:13px;font-weight:800;}
.sec-name-input:focus{background:#fff;border-color:#97a6b5;outline:none;}
.btn-del-sec{width:26px;height:26px;border:1px solid transparent;border-radius:3px;color:#7a8591;font-size:15px;}
.btn-del-sec:hover{background:#fff;border-color:#c2cad3;color:#a33d37;}
.item-head-row{display:grid;grid-template-columns:125px 130px minmax(180px,1fr) 112px;background:#f4f6f8;border-bottom:1px solid #d8dee5;color:#697480;font-size:11px;font-weight:800;}
.item-head-row span{padding:6px 8px;border-right:1px solid #d8dee5;}
.item-head-row span:last-child{border-right:0;text-align:center;}
.items-wrap{padding:0;}
.item-block{margin:0;padding:0;border-bottom:1px solid #e5e9ee;background:#fff;}
.item-block:last-child{border-bottom:1px solid #e5e9ee;margin-bottom:0;padding-bottom:0;}
.item-top{display:grid;grid-template-columns:125px 130px minmax(180px,1fr) 28px 28px 28px 28px;gap:0;align-items:stretch;margin:0;}
.item-name,.item-desc,.item-price-wrap input{height:37px;border:0;border-radius:0;background:#fff;font-size:13px;font-family:inherit;color:#1f2933;}
.item-name{flex:auto;min-width:0;padding:8px;border-right:1px solid #e5e9ee;}
.item-desc{width:100%;padding:8px;border-right:1px solid #e5e9ee;color:#4b5563;}
.item-price-wrap{position:relative;flex:auto;min-width:0;width:auto;border-right:1px solid #e5e9ee;}
.item-price-wrap input{width:100%;padding:8px 28px 8px 8px;text-align:right;background:#fff;}
.item-price-wrap .pu{right:8px;font-size:10.5px;color:#98a1aa;}
.item-name:focus,.item-price-wrap input:focus,.item-desc:focus,.calc-panel input:focus,.calc-panel select:focus{outline:2px solid rgba(184,152,90,.35);outline-offset:-2px;background:#fffdf8;}
.btn-calc,.btn-move,.btn-del-item{height:37px;border:0;border-right:1px solid #e5e9ee;border-radius:0;background:#fff;color:#8b949e;display:flex;align-items:center;justify-content:center;padding:0;font-size:12px;}
.btn-del-item{border-right:0;color:#b8c0c8;font-size:14px;}
.btn-calc:hover,.btn-move:hover{background:#f3f6f8;color:#8a6a20;}
.btn-calc.on{background:#fff7df;color:#9d7c31;}
.btn-del-item:hover{background:#fff1f0;color:#a33d37;}
.calc-panel{display:none;margin:0;padding:7px 10px 7px 125px;background:#fbfcfd;border:0;border-top:1px solid #e5e9ee;border-radius:0;gap:6px;align-items:center;}
.calc-panel.open{display:flex;}
.calc-panel input,.calc-panel select{height:29px;border:1px solid #cfd6dd;border-radius:3px;background:#fff;font-size:12px;}
.calc-panel .calc-result{min-width:84px;font-size:12px;}
.btn-add-item{width:100%;margin:0;padding:8px;border:0;border-radius:0;background:#fbfcfd;color:#5b6470;font-size:12px;font-weight:700;border-top:1px solid #e5e9ee;}
.btn-add-item:hover{background:#eef2f6;color:#1f2933;}
.btn-add-sec{width:100%;margin:0;padding:10px;border:0;border-radius:0;background:#e9edf2;color:#34404b;font-size:12.5px;font-weight:800;border-bottom:1px solid #cfd6dd;}
.btn-add-sec:hover{background:#dfe7ef;color:#1f2933;}
.btn-generate{margin:0;width:100%;border-radius:0;padding:13px;background:#1f2933;font-size:14px;font-weight:800;border-top:1px solid #111827;}
.btn-generate:hover{background:#111827;}

#live-preview-pane{top:14px;max-height:calc(100vh - 28px);padding:0;}
.live-preview-head{margin:0 0 8px;padding:10px 12px;background:#1f2933;color:#fff;border-radius:7px;border:1px solid #111827;}
.live-preview-kicker{color:#d8b866;}
.live-preview-title{font-size:15px;color:#fff;}
.live-preview-sub{color:#cbd5df;}
.live-preview-btn{border-radius:4px;background:#fff;color:#1f2933;padding:7px 10px;font-size:12px;}
.live-preview-btn:hover{background:#eef2f6;}
.live-preview-scroll{background:#d8dee5;border-radius:7px;padding:10px;}
#live-quote-output{box-shadow:0 8px 20px rgba(31,41,55,.16);border-radius:4px;}

@media (max-width:1040px){
  #app-shell{display:block;max-width:760px;padding:16px 12px 50px;}
  #form-screen{max-width:none;margin:0;}
  #live-preview-pane{margin-top:18px;}
}
@media (max-width:680px){
  .form-header{display:block;}
  .form-sub{white-space:normal;margin-top:4px;}
  .save-bar{grid-template-columns:1fr;}
  .card .row2{grid-template-columns:1fr;}
  .card .row2>.field:nth-child(odd){border-right:0;}
  .card .field{grid-template-columns:86px minmax(0,1fr);}
  .item-head-row{display:none;}
  .item-top{grid-template-columns:1fr 120px 28px 28px 28px 28px;}
  .item-name{grid-column:1 / 2;}
  .item-price-wrap{grid-column:2 / 3;}
  .item-desc{grid-column:1 / -1;border-top:1px solid #e5e9ee;border-right:0;}
  .calc-panel{padding-left:10px;}
}

</style>
</head>
<body>

<div id="app-shell">
<div id="form-screen">
  <div class="form-header">
    <p class="form-logo">SMH INTERIOR</p>
    <p class="form-title">견적서 생성기</p>
    <p class="form-sub">입력하면 바로 견적서가 만들어집니다</p>
  </div>

  <div class="save-bar">
    <button class="save-btn" onclick="saveFile()">💾 저장</button>
    <button class="save-btn" onclick="document.getElementById('load-input').click()">📂 불러오기</button>
    <input id="load-input" type="file" accept=".json,application/json" style="display:none" onchange="loadFile(this)"/>
    <button class="save-btn save-btn-reset" onclick="clearAll()">🗑 새로 작성</button>
  </div>
  <p class="save-hint">입력 내용은 이 기기에 자동 저장됩니다. 기기를 바꾸거나 백업하려면 저장 버튼을 쓰세요.</p>

  <div class="card">
    <p class="card-title">기본 정보</p>
    <div class="field"><label>견적서 제목</label><input id="f-title" type="text" value="약식 견적서"/></div>
    <div class="field"><label>주소</label><input id="f-project" type="text" placeholder="예: 주소"/></div>
    <div class="row2">
      <div class="field"><label>성함</label><input id="f-client" type="text" placeholder="예: 성함"/></div>
      <div class="field"><label>작성일</label><input id="f-date" type="text"/></div>
    </div>
    <div class="row2">
      <div class="field"><label>유효기간</label><input id="f-validity" type="text" value="14일"/></div>
      <div class="field"><label>부가세</label><input id="f-vat" type="text" value="부가세 별도"/></div>
    </div>
  </div>

  <div id="sections-wrap"></div>
  <button class="btn-add-sec" onclick="addSection()">+ 섹션 추가</button>

  <div class="card">
    <p class="card-title">경비 · 운영 설정 (기본값 10%)</p>
    <div class="row2">
      <div class="field">
        <label>공사 경비율 (%)</label>
        <div class="price-input-wrap">
          <input id="f-rate-gyeongbi" type="number" min="0" max="100" step="0.5" value="10" oninput="updateTotal()"/>
          <span class="price-unit">%</span>
        </div>
      </div>
      <div class="field">
        <label>현장 관리·운영율 (%)</label>
        <div class="price-input-wrap">
          <input id="f-rate-iyun" type="number" min="0" max="100" step="0.5" value="10" oninput="updateTotal()"/>
          <span class="price-unit">%</span>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">절삭 / 할인 (없으면 비워두세요)</p>
    <div class="row2">
      <div class="field">
        <label>할인 금액 (원)</label>
        <div class="price-input-wrap">
          <input id="f-discount" type="text" placeholder="0" oninput="fmtField(this);updateTotal()"/>
          <span class="price-unit">원</span>
        </div>
      </div>
      <div class="field"><label>할인 설명</label><input id="f-discount-desc" type="text" value="견적 조정으로 할인 적용"/></div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">합계 (자동 계산)</p>
    <div id="total-preview" class="total-preview">항목 금액을 입력하면 자동으로 계산됩니다.</div>
  </div>

  <div class="card">
    <p class="card-title">전달 메모 (줄바꿈으로 구분)</p>
    <div class="field memo-field"><textarea id="f-memo" placeholder="예: 철거 후 예외 하자 발견 시 추가 비용이 발생할 수 있습니다.&#10;가구·가전 등 별도 발주 품목은 제외됩니다."></textarea></div>
  </div>

  <button class="btn-generate" onclick="printDirectFromEditor()">PDF로 저장</button>
</div>

<aside id="live-preview-pane">
  <div class="live-preview-head">
    <div>
      <p class="live-preview-kicker">LIVE PREVIEW</p>
      <p class="live-preview-title">견적서 미리보기</p>
      <p class="live-preview-sub">입력한 내용이 오른쪽에 바로 반영됩니다</p>
    </div>
    <button class="live-preview-btn" onclick="generate()">크게 보기</button>
  </div>
  <div class="live-preview-scroll">
    <div id="live-quote-output"></div>
  </div>
</aside>
</div>

<div id="preview-screen">
  <div class="preview-toolbar">
    <button class="btn-back" onclick="goBack()">← 수정</button>
    <div class="toolbar-right">
      <button class="btn-print" onclick="printQuote()">🖨 PDF 저장</button>
      <button class="btn-dl" onclick="downloadHTML()">💾 HTML 저장</button>
    </div>
  </div>
  <div id="quote-output"></div>
</div>

<script>
const SEC_COLORS = ['var(--lav)','var(--peach)','var(--mint)','var(--blue)','var(--gold2)','var(--rose)','var(--olive)','var(--teal)'];
const SEC_HEX   = ['#cdbbe8','#e8b8ad','#61c5a2','#9fc3e4'];
let secCount = 0;

// 오늘 날짜 자동입력
function setToday(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  document.getElementById('f-date').value = `${y}.${m}.${day}`;
}
setToday();

function fmtField(inp) {
  const raw = inp.value.replace(/[^0-9]/g,'');
  inp.value = raw ? parseInt(raw).toLocaleString() : '';
}

function fmtItemPrice(inp) {
  const v = inp.value.trim();
  const special = ['별도 협의','서비스','-'].some(s => v.startsWith(s));
  if (!special) {
    const raw = v.replace(/[^0-9]/g,'');
    if (raw) inp.value = parseInt(raw).toLocaleString();
  }
  updateTotal();
}

function parseWon(str) {
  if (!str) return 0;
  str = str.toString().trim().replace(/,/g,'');
  if (['별도 협의','서비스','-',''].includes(str)) return 0;
  return parseInt(str.replace(/[^0-9]/g,''))||0;
}

function formatWon(n) {
  if (n===0) return '0원';
  const man = n/10000;
  if (Number.isInteger(man)) return man.toLocaleString()+'만원';
  return man.toFixed(1).replace(/\.0$/,'')+'만원';
}

function getRates() {
  const rg = parseFloat(document.getElementById('f-rate-gyeongbi').value);
  const ri = parseFloat(document.getElementById('f-rate-iyun').value);
  return {
    rg: isNaN(rg) ? 10 : rg,
    ri: isNaN(ri) ? 10 : ri
  };
}

function calcAmounts() {
  let itemSum = 0;
  document.querySelectorAll('.item-price').forEach(inp => { itemSum += parseWon(inp.value); });
  const { rg, ri } = getRates();
  const gyeongbi = Math.round(itemSum * rg / 100);
  const iyun     = Math.round(itemSum * ri / 100);
  const subtotal = itemSum + gyeongbi + iyun;
  const discount = parseWon(document.getElementById('f-discount').value);
  const final    = subtotal - discount;
  return { itemSum, gyeongbi, iyun, subtotal, discount, final, rg, ri };
}

function updateTotal() {
  const { itemSum, gyeongbi, iyun, subtotal, discount, final, rg, ri } = calcAmounts();
  const el = document.getElementById('total-preview');
  if (itemSum === 0) { el.innerHTML = '항목 금액을 입력하면 자동으로 계산됩니다.'; scheduleLivePreview(); return; }
  el.innerHTML = `
    <div class="trow"><span>항목 합계</span><span class="tv">${formatWon(itemSum)}</span></div>
    <div class="trow"><span>공사 경비 (${rg}%)</span><span class="tv">${formatWon(gyeongbi)}</span></div>
    <div class="trow"><span>현장 관리·운영 (${ri}%)</span><span class="tv">${formatWon(iyun)}</span></div>
    <div class="trow divline"><span>소계</span><span class="tv">${formatWon(subtotal)}</span></div>
    ${discount>0?`<div class="trow"><span>절삭</span><span class="tv red">-${formatWon(discount)}</span></div>`:''}
    <div class="trow final-line"><span>최종 견적 금액</span><span class="tv">${formatWon(final)}</span></div>
  `;
  scheduleLivePreview();
}

function addSection(name='', items=[]) {
  const idx = secCount++;
  const wrap = document.getElementById('sections-wrap');
  const div = document.createElement('div');
  div.className = 'sec-block';
  div.style.borderLeftColor = SEC_HEX[idx%4];
  div.innerHTML = `
    <div class="sec-header">
      <input class="sec-name-input" type="text" placeholder="섹션명 (예: 기초공사)" value="${name}"/>
      <button class="btn-del-sec" onclick="this.closest('.sec-block').remove();updateTotal()">✕</button>
    </div>
    <div class="item-head-row"><span>항목명</span><span>금액</span><span>설명 / 범위</span><span>계산 · 순서 · 삭제</span></div>
    <div class="items-wrap"></div>
    <button class="btn-add-item" onclick="addItem(this.previousElementSibling);updateTotal()">+ 행 추가</button>
  `;
  wrap.appendChild(div);
  const iw = div.querySelector('.items-wrap');
  if (items.length) items.forEach(it => addItem(iw, it.name, it.price, it.desc, it));
  else addItem(iw);
}

function addItem(wrap, name='', price='', desc='', calc=null) {
  const d = document.createElement('div');
  d.className = 'item-block';
  d.innerHTML = `
    <div class="item-top">
      <input class="item-name" type="text" placeholder="항목명" value="${name}"/>
      <div class="item-price-wrap">
        <input class="item-price" type="text" placeholder="금액 또는 별도 협의" value="${price}" oninput="fmtItemPrice(this)"/>
        <span class="pu">원</span>
      </div>
      <input class="item-desc" type="text" placeholder="설명 / 범위 (선택)" value="${desc}"/>
      <button class="btn-calc" title="면적으로 계산" onclick="toggleCalc(this)">🧮</button>
      <button class="btn-move" title="위로" onclick="moveItem(this,-1)">▲</button>
      <button class="btn-move" title="아래로" onclick="moveItem(this,1)">▼</button>
      <button class="btn-del-item" onclick="this.closest('.item-block').remove();updateTotal()">✕</button>
    </div>
    <div class="calc-panel">
      <input class="calc-qty" type="text" placeholder="수량" oninput="runCalc(this)"/>
      <select class="calc-unit" onchange="runCalc(this)">
        <option value="sqm">㎡</option>
        <option value="pyeong">평</option>
        <option value="m">m</option>
        <option value="ea">EA</option>
        <option value="gae">개</option>
        <option value="set">식</option>
        <option value="pum">품</option>
        <option value="dan">단</option>
      </select>
      <span class="calc-x">×</span>
      <input class="calc-rate" type="text" placeholder="단가" oninput="runCalc(this)"/>
      <label class="calc-rate-label">원/㎡</label>
      <span class="calc-eq">=</span>
      <span class="calc-result">—</span>
    </div>
  `;
  wrap.appendChild(d);
  // Enter 키로 다음 항목 추가 (항목명·금액 칸에서)
  d.querySelectorAll('.item-name, .item-price, .item-desc').forEach(inp => {
    inp.addEventListener('keydown', function(e){
      if (e.key === 'Enter') {
        e.preventDefault();
        addItem(wrap);
        const next = wrap.lastElementChild.querySelector('.item-name');
        if (next) next.focus();
      }
    });
  });
  // 저장된 계산 패널 상태 복원
  if (calc && (calc.calcQty || calc.calcRate || calc.calcOpen)) {
    const panel = d.querySelector('.calc-panel');
    if (calc.calcUnit) panel.querySelector('.calc-unit').value = calc.calcUnit;
    if (calc.calcQty)  panel.querySelector('.calc-qty').value = calc.calcQty;
    if (calc.calcRate) panel.querySelector('.calc-rate').value = calc.calcRate;
    if (calc.calcOpen) {
      panel.classList.add('open');
      d.querySelector('.btn-calc').classList.add('on');
    }
    // 라벨/결과 갱신 (금액은 이미 price로 복원돼 있으므로 덮어쓰지 않게 결과만 표시)
    const q = parseFloat((calc.calcQty||'').replace(/,/g,''))||0;
    const r = parseFloat((calc.calcRate||'').replace(/,/g,''))||0;
    if (q>0 && r>0) runCalc(panel.querySelector('.calc-qty'));
  }
  scheduleLivePreview();
}

function toggleCalc(btn) {
  const panel = btn.closest('.item-block').querySelector('.calc-panel');
  panel.classList.toggle('open');
  btn.classList.toggle('on');
}

function moveItem(btn, dir) {
  const block = btn.closest('.item-block');
  if (dir < 0) {
    const prev = block.previousElementSibling;
    if (prev) block.parentNode.insertBefore(block, prev);
  } else {
    const next = block.nextElementSibling;
    if (next) block.parentNode.insertBefore(next, block);
  }
  if (typeof saveAuto === 'function') saveAuto();
  scheduleLivePreview();
}

function printQuote() {
  const v = (id) => (document.getElementById(id)?.value || '').trim();
  const title = v('f-title') || '견적서';
  const client = v('f-client');
  let name = client ? `${title}_${client}` : title;
  name = name.replace(/[\\/:*?"<>|]/g, ' ').replace(/\s+/g, ' ').trim();
  const prev = document.title;
  document.title = name;
  window.print();
  setTimeout(() => { document.title = prev; }, 500);
}

function printDirectFromEditor() {
  const app = document.getElementById('app-shell');
  const preview = document.getElementById('preview-screen');
  const output = document.getElementById('quote-output');
  if (!app || !preview || !output) return;

  const prevAppDisplay = app.style.display;
  const prevPreviewDisplay = preview.style.display;
  const prevScrollY = window.scrollY || window.pageYOffset || 0;

  output.innerHTML = buildContent(false);
  app.style.display = 'none';
  preview.style.display = 'block';

  printQuote();

  setTimeout(() => {
    app.style.display = prevAppDisplay;
    preview.style.display = prevPreviewDisplay || 'none';
    renderLivePreview();
    window.scrollTo(0, prevScrollY);
  }, 700);
}

function runCalc(el) {
  const panel = el.closest('.calc-panel');
  const block = el.closest('.item-block');
  const qty  = parseFloat((panel.querySelector('.calc-qty').value||'').replace(/,/g,''))||0;
  const unit = panel.querySelector('.calc-unit').value;
  const rate = parseFloat((panel.querySelector('.calc-rate').value||'').replace(/,/g,''))||0;
  const result = panel.querySelector('.calc-result');
  const rateLabel = panel.querySelector('.calc-rate-label');
  const qtyInput = panel.querySelector('.calc-qty');

  // 단위별 설정: 환산계수 + 단가 라벨 + 수량 placeholder
  const cfg = {
    sqm:    { factor: 1, label: '원/㎡',  ph: '면적(㎡)' },
    pyeong: { factor: 1, label: '원/평',  ph: '면적(평)' },
    m:      { factor: 1, label: '원/m',   ph: '길이(m)'  },
    ea:     { factor: 1, label: '원/EA',  ph: '개수'     },
    gae:    { factor: 1, label: '원/개',  ph: '개수'     },
    set:    { factor: 1, label: '원/식',  ph: '수량'     },
    pum:    { factor: 1, label: '원/품',  ph: '품수'     },
    dan:    { factor: 1, label: '원/단',  ph: '단수'     }
  }[unit] || { factor: 1, label: '원', ph: '수량' };

  rateLabel.textContent = cfg.label;
  qtyInput.placeholder = cfg.ph;
  panel.querySelector('.calc-rate').placeholder = cfg.label.replace('원/','') + '당 단가';

  if (qty > 0 && rate > 0) {
    const amount = Math.round(qty * cfg.factor * rate);
    result.textContent = amount.toLocaleString() + '원';
    const priceInput = block.querySelector('.item-price');
    priceInput.value = amount.toLocaleString();
    updateTotal();
  } else {
    result.textContent = '—';
  }
}

// ===== 상태 저장 / 복원 / 자동저장 =====
const LS_KEY = 'smh_quote_autosave_v1';

function collectState() {
  const sections = [];
  document.querySelectorAll('.sec-block').forEach(sb => {
    const secName = sb.querySelector('.sec-name-input').value||'';
    const items = [];
    sb.querySelectorAll('.item-block').forEach(ib => {
      const panel = ib.querySelector('.calc-panel');
      items.push({
        name: ib.querySelector('.item-name').value||'',
        price: ib.querySelector('.item-price').value||'',
        desc: ib.querySelector('.item-desc').value||'',
        calcOpen: panel.classList.contains('open'),
        calcQty: panel.querySelector('.calc-qty').value||'',
        calcUnit: panel.querySelector('.calc-unit').value||'sqm',
        calcRate: panel.querySelector('.calc-rate').value||''
      });
    });
    sections.push({ name: secName, items });
  });
  return {
    title: val('f-title'), project: val('f-project'), client: val('f-client'),
    date: val('f-date'), validity: val('f-validity'), vat: val('f-vat'),
    rateGyeongbi: val('f-rate-gyeongbi'), rateIyun: val('f-rate-iyun'),
    discount: val('f-discount'), discountDesc: val('f-discount-desc'),
    memo: val('f-memo'), sections
  };
}
function val(id){ const e=document.getElementById(id); return e?e.value:''; }
function setVal(id,v){ const e=document.getElementById(id); if(e&&v!=null) e.value=v; }

function restoreState(s) {
  if(!s) return;
  setVal('f-title',s.title); setVal('f-project',s.project); setVal('f-client',s.client);
  setVal('f-date',s.date); setVal('f-validity',s.validity); setVal('f-vat',s.vat);
  setVal('f-rate-gyeongbi',s.rateGyeongbi); setVal('f-rate-iyun',s.rateIyun);
  setVal('f-discount',s.discount); setVal('f-discount-desc',s.discountDesc);
  setVal('f-memo',s.memo);
  const wrap = document.getElementById('sections-wrap');
  wrap.innerHTML='';
  if(s.sections && s.sections.length){
    s.sections.forEach(sec => addSection(sec.name, sec.items));
  } else {
    addSection('기초공사'); addSection('주요공사'); addSection('마감공사');
  }
  updateTotal();
}

function saveAuto() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(collectState())); } catch(e){}
}

function loadAuto() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ restoreState(JSON.parse(raw)); return true; }
  } catch(e){}
  return false;
}

function clearAll() {
  if(!confirm('모든 입력 내용을 지우고 새로 작성할까요?')) return;
  try { localStorage.removeItem(LS_KEY); } catch(e){}
  const wrap = document.getElementById('sections-wrap');
  wrap.innerHTML='';
  ['f-project','f-client','f-discount','f-memo'].forEach(id=>setVal(id,''));
  setVal('f-title','약식 견적서'); setVal('f-validity','14일'); setVal('f-vat','부가세 별도');
  setVal('f-rate-gyeongbi','10'); setVal('f-rate-iyun','10');
  setVal('f-discount-desc','견적 조정으로 할인 적용');
  setToday();
  addSection('기초공사'); addSection('주요공사'); addSection('마감공사');
  updateTotal();
}

function saveFile() {
  const data = JSON.stringify(collectState(), null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const client = (val('f-client')||'견적').replace(/[^가-힣a-zA-Z0-9]/g,'');
  const today = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `SMH견적_${client}_${today}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function loadFile(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const s = JSON.parse(e.target.result);
      restoreState(s);
      saveAuto();
      alert('불러오기 완료');
    } catch(err){ alert('파일을 읽을 수 없습니다. 올바른 견적 저장 파일인지 확인해주세요.'); }
    input.value='';
  };
  reader.readAsText(file);
}

// 입력 변화 시 자동저장 + 옆 미리보기 갱신 (debounce)
let _saveTimer;
let _previewTimer;

function scheduleLivePreview() {
  clearTimeout(_previewTimer);
  _previewTimer = setTimeout(renderLivePreview, 120);
}

function renderLivePreview() {
  const live = document.getElementById('live-quote-output');
  if (!live) return;
  live.innerHTML = buildContent(false);
}

function autosizeMemo() {
  const memo = document.getElementById('f-memo');
  if (!memo) return;
  const minHeight = 170;
  memo.style.height = 'auto';
  memo.style.height = Math.max(minHeight, memo.scrollHeight + 4) + 'px';
}

document.addEventListener('input', (e) => {
  if (e.target && e.target.id === 'f-memo') autosizeMemo();
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveAuto, 500);
  scheduleLivePreview();
});

// ===== 초기화 =====
if(!loadAuto()){
  addSection('기초공사');
  addSection('주요공사');
  addSection('마감공사');
}

function buildContent(forFile) {
  const title    = document.getElementById('f-title').value||'약식 견적서';
  const project  = document.getElementById('f-project').value||'';
  const client   = document.getElementById('f-client').value||'';
  const date     = document.getElementById('f-date').value||'';
  const validity = document.getElementById('f-validity').value||'14일';
  const vat      = document.getElementById('f-vat').value||'부가세 별도';
  const discDesc = document.getElementById('f-discount-desc').value||'견적 조정으로 할인 적용';
  const memos    = (document.getElementById('f-memo').value||'').split('\n').filter(l=>l.trim());

  const { itemSum, gyeongbi, iyun, discount, final, rg, ri } = calcAmounts();
  const totalStr = formatWon(final);
  const secBlocks = document.querySelectorAll('.sec-block');
  const sections = [];
  secBlocks.forEach((sb,si) => {
    const sname = sb.querySelector('.sec-name-input').value||`섹션 ${si+1}`;
    const items = [];
    sb.querySelectorAll('.item-block').forEach(ib => {
      const n = ib.querySelector('.item-name').value||'';
      const p = ib.querySelector('.item-price').value||'';
      const d = ib.querySelector('.item-desc').value||'';
      if (n) items.push({name:n,price:p,desc:d});
    });
    if (items.length) sections.push({name:sname,items,ci:si%8});
  });

  const visibleAmounts = [];
  sections.forEach(sec => {
    sec.items.forEach(it => {
      const special = ['별도 협의','서비스','-',''].includes((it.price||'').trim().replace(/,/g,''));
      const amt = parseWon(it.price);
      if (!special && amt > 0) visibleAmounts.push(amt);
    });
  });
  if (gyeongbi > 0) visibleAmounts.push(gyeongbi);
  if (iyun > 0) visibleAmounts.push(iyun);
  const maxForBar = Math.max(...visibleAmounts, 1);

  let body = '';
  sections.forEach((sec) => {
    const colorVar = SEC_COLORS[sec.ci];
    let secSum = 0;
    sec.items.forEach(it => {
      const special = ['별도 협의','서비스','-',''].includes((it.price||'').trim().replace(/,/g,''));
      if (!special) secSum += parseWon(it.price);

    const secSumHtml = secSum > 0 ? `<div class="q-sec-total"><span class="q-sec-total-k">소계</span><span class="q-sec-total-v">${formatWon(secSum)}</span></div>` : '';
    body += `<section class="q-section" style="--sec-color:${colorVar}"><div class="q-sec-body"><div class="q-sec-label">${sec.name}</div>`;
    sec.items.forEach(it => {
      const amt = parseWon(it.price);
      const special = ['별도 협의','서비스','-',''].includes((it.price||'').trim().replace(/,/g,''));
      const pct = special ? 0 : (amt > 0 ? Math.max(3, Math.round(amt / maxForBar * 100)) : 0);
      const displayPrice = special ? (it.price||'별도 협의') : (formatWon(amt));
      body += `<div class="q-row">
        <div class="q-row-main">
          <div class="q-name">${it.name}</div>
          <div class="q-bar"><span class="q-fill" style="width:${pct}%;background:${colorVar}"></span></div>
          <div class="q-price">${displayPrice}</div>

    <div class="q-final">

function generate() {
  document.getElementById('quote-output').innerHTML = buildContent(false);
  document.getElementById('app-shell').style.display='none';
  document.getElementById('preview-screen').style.display='block';
  window.scrollTo(0,0);
}

function goBack() {
  document.getElementById('app-shell').style.display='';
  document.getElementById('preview-screen').style.display='none';
  renderLivePreview();
}

function downloadHTML() {
  const project = document.getElementById('f-project').value||'견적서';
  const blob = new Blob([buildContent(true)], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `SMH_${project}_견적서.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}
